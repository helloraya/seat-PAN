<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Booking Kelas Kakap</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background: #f4f4f9; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; }
    
    /* Layout Kursi */
    .screen { background: #222; color: white; text-align: center; margin-bottom: 30px; padding: 10px; border-radius: 5px; font-weight: bold; }
    .row { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
    .seat { width: 50px; height: 50px; cursor: pointer; border: 2px solid #ddd; border-radius: 8px; font-weight: bold; background: white; }
    .seat:hover:not(.booked) { border-color: #2196F3; background: #e3f2fd; }
    .booked { background: #ff4d4d !important; color: white; border: none; }
    
    .btn { display: block; width: 100%; padding: 12px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; }
    #bookBtn { background: #2196F3; color: white; margin-top: 20px; }
    
    /* POP-UP MODAL (Nutupin layar di atasnya) */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 999; }
    .modal-content { background: white; padding: 20px; border-radius: 12px; text-align: center; width: 300px; position: relative; }
    .close-btn { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; color: #888; font-weight: bold; }
    
    .ticket-title { font-size: 20px; font-weight: bold; color: #2196F3; }
    .qr-box img { border: 1px solid #ccc; padding: 5px; border-radius: 5px; margin: 15px 0; }
    #printBtn { background: #4CAF50; color: white; margin-top: 10px; }

    @media print {
      body * { visibility: hidden; }
      .modal-content, .modal-content * { visibility: visible; }
      .modal-content { position: absolute; left: 0; top: 0; margin: 0; padding: 0; width: 100%; }
      #printBtn, .close-btn { display: none; }
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Pilih Kursi Lu</h2>
  <div class="screen">LAYAR BIOSKOP</div>
  
  <div class="row">
    <button class="seat" data-id="A1">A1</button>
    <button class="seat" data-id="A2">A2</button>
    <button class="seat" data-id="A3">A3</button> 
    <button class="seat" data-id="A4">A4</button>
  </div>
  
  <div class="row">
    <button class="seat" data-id="B1">B1</button>
    <button class="seat" data-id="B2">B2</button>
    <button class="seat" data-id="B3">B3</button>
    <button class="seat" data-id="B4">B4</button>
  </div>

  <button id="bookBtn" class="btn">Daftar & Konfirmasi Kursi</button>
</div>

<div class="modal-overlay" id="ticketModal">
  <div class="modal-content">
    <span class="close-btn" id="closeModal">&times;</span>
    <div class="ticket-title">E-TICKET ACARA</div>
    <p>Kursi: <strong id="ticketSeat" style="color: #ff4d4d;">-</strong></p>
    
    <div class="qr-box">
      <img id="qrCode" src="" alt="QR Code Tiket" width="150" height="150">
    </div>
    
    <button id="printBtn" class="btn" onclick="window.print()">Print Tiket</button>
  </div>
</div>

<script>
  const MANAGER_PIN = "8888"; // PIN Manager buat reset kursi
  const seats = document.querySelectorAll('.seat');
  
  // Ambil data dari "Hardisk Browser" (LocalStorage)
  let bookedSeats = JSON.parse(localStorage.getItem('bookedSeats')) || [];
  let selectedSeats = [];

  // Fungsi buat nge-render ulang kursi pas awal buka / abis booking
  function renderSeats() {
    seats.forEach(seat => {
      const seatId = seat.getAttribute('data-id');
      
      // Reset style bawaan dulu
      seat.className = 'seat';
      seat.style.background = "";
      seat.style.color = "";
      
      // Kalau ada di database lokal, bikin jadi merah
      if (bookedSeats.includes(seatId)) {
        seat.classList.add('booked');
      } 
      // Kalau lagi dipilih saat ini (keranjang), bikin biru
      else if (selectedSeats.includes(seatId)) {
        seat.style.background = "#2196F3";
        seat.style.color = "white";
      }
    });
  }

  // Aksi pas kursi diklik
  seats.forEach(seat => {
    seat.addEventListener('click', () => {
      const seatId = seat.getAttribute('data-id');

      // LOGIKA MANAGER: Kalau kursi udah dibooking (merah)
      if (bookedSeats.includes(seatId)) {
        let inputPin = prompt(`Kursi ${seatId} udah di-booking. Masukin PIN Manager buat ngebatalin:`);
        if (inputPin === MANAGER_PIN) {
          bookedSeats = bookedSeats.filter(id => id !== seatId); // Hapus dari daftar booked
          localStorage.setItem('bookedSeats', JSON.stringify(bookedSeats)); // Update hardisk lokal
          alert(`Kursi ${seatId} berhasil di-reset!`);
          renderSeats();
        } else if (inputPin !== null) {
          alert("PIN Salah ngab!");
        }
        return; // Stop proses di sini biar gak masuk keranjang
      }

      // LOGIKA USER BIASA: Pilih atau batal pilih kursi kosong
      if (selectedSeats.includes(seatId)) {
         selectedSeats = selectedSeats.filter(id => id !== seatId);
      } else {
         selectedSeats.push(seatId);
      }
      renderSeats();
    });
  });

  // Munculin Pop-up Tiket
  document.getElementById('bookBtn').addEventListener('click', () => {
    if(selectedSeats.length > 0) {
      // 1. Simpen kursi yang dipilih ke "database" lokal
      bookedSeats.push(...selectedSeats);
      localStorage.setItem('bookedSeats', JSON.stringify(bookedSeats));
      
      // 2. Tulis data ke Pop-up
      document.getElementById('ticketSeat').innerText = selectedSeats.join(', ');
      const dataQR = `TIKET-${selectedSeats.join('-')}`;
      document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(dataQR)}`;
      
      // 3. Tunjukin Pop-up nya
      document.getElementById('ticketModal').style.display = 'flex';
      
      // 4. Kosongin keranjang belanja dan update visual
      selectedSeats = [];
      renderSeats();
    } else {
      alert('Pilih kursi dulu dong, bos!');
    }
  });

  // Nutup Pop-up Tiket
  document.getElementById('closeModal').addEventListener('click', () => {
    document.getElementById('ticketModal').style.display = 'none';
  });

  // Jalanin fungsi render pas web pertama kali dibuka
  renderSeats();
</script>

</body>
</html>
